<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TradieMate</title>
    <base href="/"/>
    <link rel="stylesheet" href="css/app.css"/>
    <link rel="stylesheet" href="TradieMateWeb.Client.styles.css"/>
</head>
<body>
    <div id="app">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:auto;margin-top:40vh;width:50px;">
            <circle cx="50" cy="50" r="40" stroke="#89b4fa" stroke-width="6" fill="none" stroke-dasharray="60 40" >
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1s" repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>
    <div id="blazor-error-ui" style="display:none">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        function downloadPdf(base64, fileName) {
            const link = document.createElement('a');
            link.href = 'data:application/pdf;base64,' + base64;
            link.download = fileName;
            link.click();
        }
    </script>
</body>
</html>
